# Change prefix key
unbind C-b
set -g prefix C-a

# Default shel
# $TMUX_SHELL should be defined in shell settings as environment variable
set-option -g default-shell "${TMUX_SHELL}"
set -g default-command "${TMUX_SHELL}"

# window
set -g base-index 1
set -g pane-base-index 1

set-option -g renumber-windows on

set -s escape-time 0
set-option -g mouse on

### Key maps
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

bind -n C-S-h resize-pane -L 5
bind -n C-S-l resize-pane -R 5
bind -n C-S-k resize-pane -U 5
bind -n C-S-j resize-pane -D 5
bind -n C-S-f resize-pane -Z

bind -n C-left  previous-window
bind -n C-right next-window
bind -n C-up    new-window
bind -n C-down  kill-window

bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

bind p popup -E -w90% -h90%
bind-key -T prefix r source-file ~/.config/tmux/tmux.conf \; display-message 'Reload was successful'

set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'
set -g status-left ""
set -g status-right ""
set -g status-justify right
setw -g status-style fg=colour255,bg=colour234
setw -g window-status-current-format '#[bg=default,fg=colour255]#{?client_prefix,#[bg=colour3],} #I #W '
setw -g window-status-format '#[fg=colour242] #I #W '
