git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  parseEmoji: true

gui:
  tabWidth: 2
  theme:
    activeBorderColor:
      - "#91d7e3"
      - bold
    inactiveBorderColor:
      - "#a5adcb"
    optionsTextColor:
      - "#8aadf4"
    selectedLineBgColor:
      - "#363a4f"
    cherryPickedCommitBgColor:
      - "#494d64"
    cherryPickedCommitFgColor:
      - "#91d7e3"
    unstagedChangesColor:
      - "#ed8796"
    defaultFgColor:
      - "#cad3f5"
    searchingActiveBorderColor:
      - "#eed49f"

  authorColors:
    "*": "#b7bdf8"

customCommands:
  - key: C
    description: "czg を利用して絵文字付きコミットを行います。"
    context: "files"
    command: "czg emoji"
    output: terminal
  - key: c
    description: "czg を利用して絵文字無しコミットを行います。"
    context: "files"
    command: "czg"
    output: "terminal"
  - key: n
    description: "gwq を利用して新しい git worktree を作成します。"
    context: "worktrees"
    prompts:
      - type: "menuFromCommand"
        title: "Select a branch to create a new worktree from"
        key: "Branch"
        command: "git branch --format='%(refname:short)'"
    command: "gwq add --stay {{ .Form.Branch }}"
